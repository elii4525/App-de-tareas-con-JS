<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas -Elizabeth</title>
</head>
<body>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

        <main class="container py-5">
            <section class="card shadow border-0 rounded-4 mx-auto" style="max-width: 800px;">
                <div class="card-body p-4">
                   
                    <h1 class="text-center mb-2">Lista de Tareas</h1>
                    <p class="text-center text-muted mb-4">Agrega tareas, marca las que completes y elimina las que ya no necesites.</p>
                    
                    <div class="row g-3 mb-4">
                        <input type="text" id="txtTarea" class="form-control" placeholder="Escribe una tarea">

                        <div class="col-12 col-md-3">
                        <select id="prioridad" class="form-select">
                            <option value="" selected disabled hidden>Prioridad</option>
                            <option value="Alta">Alta</option>
                            <option value="Media">Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                        </div>

                        <div class="col-12 col-md-3 d-grid">
                            <button id="btnAgregar" class="btn btn-primary">Agregar</button>
                        </div>

                    </div>
                    
                    <div id="listaTareas" class="d-flex flex-column gap-3">
                        <!-- Aqui se agregaran las taras con JS -->
                    </div>

                    <p id="contador" class="text-center fw-bold text-secondary mt-4">Tareas registradas: 0</p>

                </div>
            </section>
        </main>

        


    <!-- JS SweetAlert2 -->
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- JS de Boostrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <!-- JS de la aplicación -->
     <script src="js/controllers/index.controller.js"></script>
</body>
</html>
